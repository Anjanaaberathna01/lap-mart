<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Success - Lap Mart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light text-center">
<div class="container mt-5">
    <div class="card p-5 shadow">
        <h1 class="text-success">Order Placed!</h1>
        <p class="lead" th:text="${successMessage}">Your order details appear here.</p>
        <p>Thank you for shopping with Lap Mart. We are preparing your laptop for delivery.</p>
        <div class="mt-4">
            <a th:href="@{/products}" class="btn btn-primary">Back to Laptops</a>
        </div>
    </div>
</div>
</body>
</html>
