<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Your Shopping Cart - Lap Mart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .cart-img { width: 80px; height: auto; border-radius: 5px; }
    .table middle { vertical-align: middle; }
  </style>
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow border-0">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Shopping Cart</h4>
      <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Continue Shopping</a>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
        <h4>Your cart is empty!</h4>
        <a th:href="@{/products}" class="btn btn-primary mt-3">Browse Laptops</a>
      </div>

      <div th:if="${not #lists.isEmpty(cartItems)}">
        <table class="table table-hover align-middle">
          <thead class="table-light">
          <tr>
            <th>Image</th>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="item : ${cartItems}">
            <td>
              <img th:src="@{${item.product.imageUrl1}}" class="cart-img" alt="Laptop">
            </td>
            <td>
              <strong th:text="${item.product.brand}">Brand</strong><br>
              <small th:text="${item.product.modelName}">Model</small>
            </td>
            <td th:text="'Rs. ' + ${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 2, 'POINT')}">0.00</td>
            <td th:text="${item.quantity}">1</td>
            <td class="fw-bold" th:text="'Rs. ' + ${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 2, 'POINT')}">0.00</td>
            <td>
              <a th:href="@{'/cart/remove/' + ${item.id}}" class="btn btn-sm btn-outline-danger">Remove</a>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="d-flex justify-content-end mt-4">
          <div class="text-end">
            <h5 class="text-muted">Grand Total:</h5>
            <h2 class="text-primary" th:text="'Rs. ' + ${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 2, 'POINT')}">0.00</h2>

            <a th:href="@{/checkout}" class="btn btn-success btn-lg px-5 mt-2 shadow">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
