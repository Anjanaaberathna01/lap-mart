<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Keyboards</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Keyboards</h2>
    <a th:href="@{/admin/keyboards/add}" class="btn btn-primary">Add Keyboard</a>
</div>

<div th:if="${#lists.isEmpty(keyboards)}" class="alert alert-info">No keyboards found.</div>

<div th:if="${!#lists.isEmpty(keyboards)}">
    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Brand</th>
            <th>Price</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="k : ${keyboards}">
            <td th:text="${k.id}">1</td>
            <td th:text="${k.brand}">Brand</td>
            <td th:text="${#numbers.formatDecimal(k.price, 1, 'COMMA', 2, 'POINT')}">0.00</td>
            <td>
                <img th:if="${k.image1 != null}" th:src="${k.image1}" width="80" class="img-thumbnail" alt="Keyboard Image" />
                <span th:if="${k.image1 == null}" class="text-muted">No Image</span>
            </td>
            <td>
                <a th:href="@{'/admin/keyboards/edit/' + ${k.id}}" class="btn btn-sm btn-secondary">Edit</a>
                <form th:action="@{'/admin/keyboards/delete/' + ${k.id}}" method="post" style="display:inline-block; margin-left:6px;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this keyboard?');">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
