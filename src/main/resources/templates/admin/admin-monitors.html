<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Monitors</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Monitors</h2>
    <a th:href="@{/admin/monitors/add}" class="btn btn-primary">Add Monitor</a>
</div>

<div th:if="${#lists.isEmpty(monitors)}" class="alert alert-info">No monitors found.</div>

<div th:if="${!#lists.isEmpty(monitors)}">
    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Brand</th>
            <th>Price</th>
            <th>Stock Quantity</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${monitors}">
            <td th:text="${m.id}">1</td>
            <td th:text="${m.brand}">Brand</td>
            <td th:text="${#numbers.formatDecimal(m.price, 1, 'COMMA', 2, 'POINT')}">0.00</td>
            <td th:text="${m.stockQuantity}">0</td>
            <td>
                <img th:if="${m.image1 != null}" th:src="${m.image1}" width="80" class="img-thumbnail" alt="Monitor Image" />
                <span th:if="${m.image1 == null}" class="text-muted">No Image</span>
            </td>
            <td>
                <a th:href="@{'/admin/monitors/edit/' + ${m.id}}" class="btn btn-sm btn-secondary">Edit</a>
                <form th:action="@{'/admin/monitors/delete/' + ${m.id}}" method="post" style="display:inline-block; margin-left:6px;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this monitor?');">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
