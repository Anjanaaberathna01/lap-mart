<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lap Mart - Admin Products</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Admin Inventory Management</h2>
  <a th:href="@{/admin/products/add}" class="btn btn-success">Add New Laptop</a>
</div>
<ul class="navbar-nav d-flex flex-row gap-3 align-items-center">
  <li class="nav-item">
    <a class="nav-link active" th:href="@{/admin/dashboard}">Dashboard
      <span class="badge bg-primary ms-2" th:text="${totalUsers}">0</span>
      <span class="badge bg-info ms-1" th:text="${totalProducts}">0</span>
    </a>
  </li>
  <li class="nav-item">
    <a class="nav-link" th:href="@{/admin/users}">Manage Users</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" th:href="@{/admin/orders}">Manage Orders</a>
  </li>
</ul>

<table class="table table-striped table-bordered shadow-sm">
  <thead class="table-dark">
  <tr>
    <th>Brand</th>
    <th>Model</th>
    <th>Price</th>
    <th>Stock</th>
    <th>Main Image</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="p : ${laptops}">
    <td th:text="${p.brand}"></td>
    <td th:text="${p.modelName}"></td>
    <td th:text="${'Rs' + p.price}"></td>
    <td th:text="${p.stockQuantity}"></td>
    <td>
      <img th:if="${p.imageUrl1 != null}"
           th:src="${p.imageUrl1}"
           width="80"
           class="img-thumbnail"
           alt="Laptop Image"/>

      <span th:if="${p.imageUrl1 == null}" class="text-muted">No Image</span>
    </td>
    <td>
      <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Edit</a>

      <a th:href="@{/admin/products/delete/{id}(id=${p.id})}"
         class="btn btn-danger btn-sm"
         onclick="return confirm('Are you sure you want to delete this laptop and its images?')">
        Delete
      </a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
