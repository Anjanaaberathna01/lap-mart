<div class="container mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card bg-primary text-white shadow">
        <div class="card-body text-center">
          <h5 class="card-title">Total Registered Users</h5>
          <h2 class="display-4" th:text="${totalUsers}">0</h2>
          <a th:href="@{/admin/users}" class="btn btn-light btn-sm mt-2">View All Users</a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card bg-success text-white shadow">
        <div class="card-body text-center">
          <h5 class="card-title">Total Products</h5>
          <h2 class="display-4" th:text="${totalProducts}">0</h2>
          <a th:href="@{/admin/products}" class="btn btn-light btn-sm mt-2">Manage Stock</a>
        </div>
      </div>
    </div>
  </div>
</div>
