<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Laptop - Lap Mart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h3>Add New Laptop</h3>
    </div>
    <div class="card-body">
        <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label">Brand</label>
                <label>
                    <input type="text" th:field="*{brand}" class="form-control" required>
                </label>
            </div>
            <div class="mb-3">
                <label class="form-label">Model Name</label>
                <label>
                    <input type="text" th:field="*{modelName}" class="form-control" required>
                </label>
            </div>
            <div class="mb-3">
                <label class="form-label">Price</label>
                <label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                </label>
            </div>
            <div class="mb-3">
                <label class="form-label">Stock Quantity</label>
                <label>
                    <input type="number" th:field="*{stockQuantity}" class="form-control" required>
                </label>
            </div>
            <div class="mb-3">
                <label class="form-label">Main Image</label>
                <input type="file" name="file1" class="form-control" accept="image/*">
            </div>
            <div class="mb-3">
                <label class="form-label">Side View Image</label>
                <input type="file" name="file2" class="form-control" accept="image/*">
            </div>
            <div class="mb-3">
                <label class="form-label">Detail Image</label>
                <input type="file" name="file3" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-success">Save Product</button>
            <a th:href="@{/admin/products}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
