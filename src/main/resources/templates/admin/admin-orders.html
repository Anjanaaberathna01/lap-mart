<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<!-- Debug / diagnostics (shows whether controller passed orders and how many) -->
<div th:if="${orders == null}" class="alert alert-danger">Debug: 'orders' model attribute is MISSING.</div>
<div th:if="${orders != null}" class="alert alert-info">Debug: orders present, count = <span th:text="${#lists.size(orders)}">0</span></div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 th:if="${filterUser == null}">Orders</h2>
    <div th:if="${filterUser != null}">
        <h2>Orders for <span th:text="${filterUser.email}">user@example.com</span></h2>
        <a th:href="@{/admin/users}" class="btn btn-secondary">Back to Users</a>
    </div>
    <a th:href="@{/admin/dashboard}" class="btn btn-secondary" th:if="${filterUser == null}">Back to Dashboard</a>
</div>

<div th:if="${orders == null or #lists.isEmpty(orders)}">
    <div class="alert alert-info">No orders found or the orders list is empty.</div>
</div>

<div th:if="${orders != null and !#lists.isEmpty(orders)}">
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Total</th>
            <th>Status</th>
            <th>Placed At</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.user != null ? (order.user.fullName != null ? order.user.fullName : order.user.email) : 'Guest'}">user</td>
            <td>$<span th:text="${order.totalPrice}">0.00</span></td>
            <td th:text="${order.status}">PENDING</td>
            <td th:text="${order.createdAt}">2026-01-01</td>
            <td>
                <a th:href="@{'/admin/orders/' + ${order.id}}" class="btn btn-sm btn-primary">View</a>

                <div th:if="${currentUserRole == 'ROLE_ADMIN'}" style="display:inline">
                    <form th:action="@{/admin/orders/delete/{id}(id=${order.id})}"
                          method="post"
                          style="display:inline"
                          onsubmit="return confirm('Delete order #' + [[${order.id}]] + '?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-sm btn-danger ms-1">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
