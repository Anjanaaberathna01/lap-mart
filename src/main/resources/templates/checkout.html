<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Lap Mart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .checkout-img { width: 60px; height: auto; border-radius: 5px; }
  </style>
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row">
    <!-- Order Summary Section -->
    <div class="col-md-8">
      <div class="card shadow border-0 mb-4">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">Order Summary</h4>
        </div>
        <div class="card-body">
          <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
            <h4>Your cart is empty!</h4>
            <a th:href="@{/products}" class="btn btn-primary mt-3">Browse Laptops</a>
          </div>

          <div th:if="${not #lists.isEmpty(cartItems)}">
            <table class="table table-hover align-middle">
              <thead class="table-light">
              <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="item : ${cartItems}">
                <td>
                  <img th:src="@{${item.product.imageUrl1}}" class="checkout-img" alt="Laptop">
                </td>
                <td>
                  <strong th:text="${item.product.brand}">Brand</strong><br>
                  <small th:text="${item.product.modelName}">Model</small>
                </td>
                <td th:text="'Rs. ' + ${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 2, 'POINT')}">0.00</td>
                <td th:text="${item.quantity}">1</td>
                <td class="fw-bold" th:text="'Rs. ' + ${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 2, 'POINT')}">0.00</td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Shipping Information Section -->
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">Shipping Information</h4>
        </div>
        <div class="card-body">
          <form th:action="@{/api/orders/place}" method="post" id="checkoutForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" name="firstName" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" name="lastName" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="address" class="form-label">Address</label>
              <input type="text" class="form-control" id="address" name="address" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="city" class="form-label">City</label>
                <input type="text" class="form-control" id="city" name="city" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="postalCode" class="form-label">Postal Code</label>
                <input type="text" class="form-control" id="postalCode" name="postalCode" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="phone" class="form-label">Phone Number</label>
              <input type="tel" class="form-control" id="phone" name="phone" required>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Order Total and Place Order Section -->
    <div class="col-md-4">
      <div class="card shadow border-0 sticky-top" style="top: 20px;">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">Order Total</h4>
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal:</span>
            <span th:text="'Rs. ' + ${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 2, 'POINT')}">0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Shipping:</span>
            <span class="text-success">FREE</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between mb-3">
            <strong>Total:</strong>
            <strong class="text-success" th:text="'Rs. ' + ${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 2, 'POINT')}">0.00</strong>
          </div>
          
          <button type="submit" form="checkoutForm" class="btn btn-success btn-lg w-100 mb-2" th:disabled="${#lists.isEmpty(cartItems)}">
            Place Order
          </button>
          <a th:href="@{/cart}" class="btn btn-outline-secondary w-100">Back to Cart</a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
