<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add / Edit Mouse</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h3 th:text="${mouse.id} == null ? 'Add Mouse' : 'Edit Mouse'"></h3>
    </div>
    <div class="card-body">
        <form th:action="@{/admin/mice/save}" th:object="${mouse}" method="post" enctype="multipart/form-data">
            <div th:if="${_csrf != null}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            </div>

            <input type="hidden" th:field="*{id}"/>

            <div th:if="${errorMessage != null}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                <ul>
                    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                </ul>
            </div>

            <div class="mb-3">
                <label class="form-label">Brand</label>
                <input type="text" th:field="*{brand}" class="form-control" required />
                <div class="text-danger" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" th:field="*{price}" class="form-control" />
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Image 1 (upload)</label>
                <div>
                    <input type="file" name="image1File" accept="image/*" class="form-control" />
                </div>
                <div class="mt-2" th:if="${mouse.image1 != null}">
                    <small class="text-muted">Current:</small>
                    <div><img th:src="${mouse.image1}" width="120" class="img-thumbnail" alt="Mouse Image 1"/></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Image 2 (upload)</label>
                <div>
                    <input type="file" name="image2File" accept="image/*" class="form-control" />
                </div>
                <div class="mt-2" th:if="${mouse.image2 != null}">
                    <small class="text-muted">Current:</small>
                    <div><img th:src="${mouse.image2}" width="120" class="img-thumbnail" alt="Mouse Image 2"/></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Image 3 (upload)</label>
                <div>
                    <input type="file" name="image3File" accept="image/*" class="form-control" />
                </div>
                <div class="mt-2" th:if="${mouse.image3 != null}">
                    <small class="text-muted">Current:</small>
                    <div><img th:src="${mouse.image3}" width="120" class="img-thumbnail" alt="Mouse Image 3"/></div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/admin/mice}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
