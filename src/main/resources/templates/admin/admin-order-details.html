<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="mb-3">
    <a th:href="@{/admin/orders}" class="btn btn-light">Back to Orders</a>
</div>

<div class="card">
    <div class="card-body">
        <h4>Order #<span th:text="${order.id}">ID</span></h4>

        <h6>User details</h6>
        <p><strong>Name:</strong> <span th:text="${order.user != null ? order.user.fullName : ''}"></span></p>
        <p><strong>Email:</strong> <span th:text="${order.user != null ? order.user.email : ''}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${order.phoneNumber}"></span></p>
        <p><strong>Shipping address:</strong> <span th:text="${order.shippingAddress}"></span></p>

        <hr/>
        <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
        <div th:if="${currentUserRole == 'ROLE_ADMIN'}" class="mb-3">
            <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-flex gap-2 align-items-center">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <select name="status" class="form-select form-select-sm" style="width:200px">
                    <option th:selected="${order.status == 'PENDING'}" value="PENDING">PENDING</option>
                    <option th:selected="${order.status == 'PROCESSING'}" value="PROCESSING">PROCESSING</option>
                    <option th:selected="${order.status == 'SHIPPED'}" value="SHIPPED">SHIPPED</option>
                    <option th:selected="${order.status == 'DELIVERED'}" value="DELIVERED">DELIVERED</option>
                    <option th:selected="${order.status == 'CANCELLED'}" value="CANCELLED">CANCELLED</option>
                </select>
                <button type="submit" class="btn btn-sm btn-primary">Update Status</button>
            </form>
        </div>
        <p><strong>Total:</strong> $<span th:text="${order.totalPrice}"></span></p>
        <p><strong>Placed at:</strong> <span th:text="${order.createdAt}"></span></p>

        <h5 class="mt-3">Items</h5>
        <table class="table table-sm">
            <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Unit Price</th>
                <th>Subtotal</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${order.items}">
                <td th:text="${item.productName}">Product</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.unitPrice}">0.00</td>
                <td th:text="${item.subtotal}">0.00</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
