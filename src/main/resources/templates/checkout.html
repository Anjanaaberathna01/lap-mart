<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout - Lap Mart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row">
        <div class="col-md-4 order-md-2 mb-4">
            <h4 class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted">Your Cart</span>
            </h4>
            <ul class="list-group mb-3">
                <li class="list-group-item d-flex justify-content-between bg-light">
                    <span>Total (LKR)</span>
                    <strong th:text="${totalPrice != null ? totalPrice : '0.00'}">Rs. 0.00</strong>
                </li>
            </ul>
        </div>

        <div class="col-md-8 order-md-1">
            <h4 class="mb-3">Shipping & Payment</h4>

            <form th:action="@{/orders/place}" method="post">
                <div th:if="${_csrf != null}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </div>

                <div class="mb-3">
                    <label for="address">Shipping Address</label>
                    <input type="text" class="form-control" id="address" name="shippingAddress" required>
                </div>

                <div class="mb-3">
                    <label for="phone">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phoneNumber"
                           pattern="[0-9]{10}" placeholder="07XXXXXXXX" required>
                </div>

                <hr class="mb-4">
                <h5 class="mb-3">Payment Method</h5>

                <div class="my-3">
                    <div class="form-check">
                        <input id="cash" name="paymentMethod" type="radio" class="form-check-input" value="CASH" checked required>
                        <label class="form-check-label" for="cash">Cash on Delivery</label>
                    </div>
                    <div class="form-check">
                        <input id="card" name="paymentMethod" type="radio" class="form-check-input" value="CARD" required>
                        <label class="form-check-label" for="card">Credit/Debit Card</label>
                    </div>
                    <div class="form-check">
                        <input id="paypal" name="paymentMethod" type="radio" class="form-check-input" value="PAYPAL" required>
                        <label class="form-check-label" for="paypal">PayPal</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-lg btn-block w-100 mt-2 shadow">
                    Complete Purchase
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
