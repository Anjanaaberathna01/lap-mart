<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Manage Users - Lap Mart Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h2>Registered Users</h2>
        <a th:href="@{/admin/products}" class="btn btn-secondary">Back to Products</a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.email}">user@example.com</td>
                    <td>
                                <span th:text="${user.role}"
                                      th:classappend="${user.role == 'ROLE_ADMIN' ? 'badge bg-danger' : 'badge bg-primary'}">
                                    USER
                                </span>
                    </td>
                    <td>
                        <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                        <span th:if="${!user.enabled}" class="badge bg-secondary">Disabled</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/users/' + ${user.id} + '/orders'}" class="btn btn-sm btn-info">View Orders</a>
                        <div th:if="${currentUserRole == 'ROLE_ADMIN'}" style="display:inline">
                            <form th:action="@{/admin/users/{id}/deactivate(id=${user.id})}" method="post" style="display:inline" th:if="${user.enabled}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-warning ms-1">Deactivate</button>
                            </form>
                            <form th:action="@{/admin/users/{id}/activate(id=${user.id})}" method="post" style="display:inline" th:if="${!user.enabled}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-success ms-1">Activate</button>
                            </form>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="display:inline" onsubmit="return confirm('Delete user ' + [[${user.email}]] + '?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-danger ms-1">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
